<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NORDHEIM — A Tale of the North</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;font-family:"Futura","Segoe UI",Arial,sans-serif;touch-action:none;background:#07090c}
  #cv{display:block;touch-action:none}
  /* crosshair: skyrim dot */
  #cross{position:fixed;left:50%;top:50%;width:5px;height:5px;border-radius:50%;transform:translate(-50%,-50%);
    background:rgba(235,240,244,.75);box-shadow:0 0 4px rgba(0,0,0,.8);pointer-events:none;z-index:5}
  /* compass strip */
  #compass{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:6;opacity:.95;max-width:70vw}
  /* skyrim bars: magicka | health | stamina */
  #bars{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);display:flex;gap:34px;z-index:6;align-items:center}
  .bar{width:190px;height:7px;background:rgba(8,10,12,.72);border:1px solid rgba(210,218,226,.5);overflow:hidden;
    box-shadow:0 0 6px rgba(0,0,0,.7),inset 0 0 4px rgba(0,0,0,.9)}
  .bar i{display:block;height:100%;width:100%;transition:width .15s}
  #sh i{background:linear-gradient(#7db8e8,#2c5c8a)}
  #hp i{background:linear-gradient(#c04038,#6e1512)}
  #st i{background:linear-gradient(#69a052,#2c5220)}
  /* HUD texts */
  #msg{position:fixed;top:22%;left:50%;transform:translateX(-50%);color:#e6eaee;font-size:21px;letter-spacing:4px;
    text-transform:uppercase;text-shadow:0 2px 10px #000;opacity:0;transition:opacity .8s;z-index:7;text-align:center;white-space:nowrap}
  #shout{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:64px;letter-spacing:16px;
    text-shadow:0 0 34px #9fd8ff;opacity:0;z-index:7;font-weight:600}
  #kills{position:fixed;bottom:16px;left:14px;color:#c9ccd0;font-size:12px;letter-spacing:2px;text-transform:uppercase;
    text-shadow:0 1px 3px #000;z-index:6}
  #flash{position:fixed;inset:0;pointer-events:none;z-index:8;opacity:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(150,0,0,.6) 100%)}
  #wflash{position:fixed;inset:0;pointer-events:none;z-index:8;opacity:0;background:radial-gradient(ellipse at center,rgba(210,240,255,.75),transparent 70%)}
  #musicBtn{position:fixed;top:10px;right:12px;z-index:9;background:rgba(8,10,12,.55);color:#dfe3e6;border:1px solid rgba(210,218,226,.35);
    padding:7px 13px;font-family:inherit;font-size:12px;letter-spacing:2px;cursor:pointer;text-transform:uppercase}
  /* touch controls */
  #touch{display:none}
  #joy{position:fixed;left:26px;bottom:70px;width:118px;height:118px;border-radius:50%;z-index:10;
    background:rgba(10,12,14,.35);border:1px solid rgba(210,218,226,.35)}
  #knob{position:absolute;left:50%;top:50%;width:48px;height:48px;border-radius:50%;transform:translate(-50%,-50%);
    background:rgba(220,226,232,.5);box-shadow:0 3px 10px rgba(0,0,0,.4)}
  #btns{position:fixed;right:22px;bottom:64px;display:flex;flex-direction:column;gap:14px;z-index:10}
  .tbtn{width:64px;height:64px;border-radius:50%;background:rgba(10,12,14,.45);border:1px solid rgba(210,218,226,.4);
    color:#e6eaee;font-size:26px;display:flex;align-items:center;justify-content:center;user-select:none}
  .tbtn.on{background:rgba(220,226,232,.4);border-color:#fff}
  /* overlays */
  .ovl{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 38%,#232a33 0%,#0a0d11 70%);display:flex;
    flex-direction:column;align-items:center;justify-content:center;z-index:20;transition:opacity .6s;color:#e6eaee}
  .ovl.hide{opacity:0;pointer-events:none}
  .ovl h1{font-size:58px;letter-spacing:26px;font-weight:400;text-transform:uppercase;text-indent:26px;
    text-shadow:0 0 46px rgba(159,216,255,.25),0 2px 8px #000}
  .ovl .rule{width:340px;height:1px;background:linear-gradient(90deg,transparent,#9aa4ae,transparent);margin:16px 0}
  .ovl .sub{margin:2px 0 26px;font-size:13px;letter-spacing:7px;color:#8f9aa6;text-transform:uppercase}
  .ovl table{color:#b9c0c7;font-size:13px;letter-spacing:1px;border-spacing:14px 4px;margin-bottom:26px;text-transform:uppercase}
  .ovl td:first-child{color:#7d8894;text-align:right}
  .ovl button{background:none;border:1px solid #b9c0c7;color:#e6eaee;font-family:inherit;font-size:15px;
    letter-spacing:6px;padding:12px 44px;cursor:pointer;text-transform:uppercase;text-indent:6px}
  .ovl button:hover{background:rgba(220,226,232,.1)}
  #died{background:rgba(4,3,3,.85)}#died h1{color:#a82c2c;text-shadow:0 0 40px #400}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="cross"></div>
<canvas id="compass" width="520" height="46"></canvas>
<div id="bars">
  <div class="bar" id="sh"><i></i></div>
  <div class="bar" id="hp"><i></i></div>
  <div class="bar" id="st"><i></i></div>
</div>
<div id="touch">
  <div id="joy"><div id="knob"></div></div>
  <div id="btns">
    <div class="tbtn" id="bAtk">⚔️</div>
    <div class="tbtn" id="bShout">🌀</div>
    <div class="tbtn" id="bJump">⤒</div>
    <div class="tbtn" id="bRun">🏃</div>
  </div>
</div>
<div id="msg"></div><div id="shout">FUS</div>
<div id="kills"></div>
<div id="flash"></div><div id="wflash"></div>
<button id="musicBtn">♪ Music: off</button>

<div class="ovl" id="overlay">
  <h1>NORDHEIM</h1>
  <div class="rule"></div>
  <div class="sub">A Tale of the North</div>
  <table>
    <tr><td>WASD</td><td>move</td></tr>
    <tr><td>Shift</td><td>sprint</td></tr>
    <tr><td>Space</td><td>jump</td></tr>
    <tr><td>Click</td><td>sword attack</td></tr>
    <tr><td>Q</td><td>shout (learn Words of Power at glowing stones)</td></tr>
  </table>
  <button id="playBtn">BEGIN</button>
</div>
<div class="ovl hide" id="died"><h1>YOU DIED</h1><div class="sub">CLICK TO RISE AGAIN</div></div>

<script src="three.min.js"></script>
<script>
const cv=document.getElementById("cv");

/* ============================================================ AUDIO */
const Music=(()=>{
  let ctx,master,on=false,timers=[];
  function ac(){ctx=ctx||new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==="suspended")ctx.resume();
    master=master||(()=>{const g=ctx.createGain();g.gain.value=.9;g.connect(ctx.destination);return g;})();return ctx;}
  function tone(f,s,d,v,tp,dst){const o=ctx.createOscillator(),g=ctx.createGain();o.type=tp||"sine";o.frequency.value=f;
    g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(v,s+.08);g.gain.exponentialRampToValueAtTime(1e-4,s+d);
    o.connect(g).connect(dst||master);o.start(s);o.stop(s+d+.1);}
  let hall=null;
  function ensureHall(){if(hall)return;                      // cheap epic-hall echo
    hall=ctx.createDelay(1);hall.delayTime.value=.31;
    const fb=ctx.createGain();fb.gain.value=.34;
    const wet=ctx.createGain();wet.gain.value=.5;
    hall.connect(fb).connect(hall);hall.connect(wet).connect(master);}
  function toHall(node){ensureHall();node.connect(master);node.connect(hall);}
  function taiko(s,big){                                     // war drum with pitch-drop thump
    const b=ctx.createBuffer(1,ctx.sampleRate*.5,ctx.sampleRate),ch=b.getChannelData(0);
    for(let i=0;i<ch.length;i++)ch[i]=(Math.random()*2-1)*Math.pow(1-i/ch.length,3);
    const src=ctx.createBufferSource();src.buffer=b;
    const f=ctx.createBiquadFilter();f.type="lowpass";f.frequency.value=big?150:340;
    const g=ctx.createGain();g.gain.setValueAtTime(big?.65:.3,s);g.gain.exponentialRampToValueAtTime(1e-4,s+(big?.5:.28));
    src.connect(f).connect(g);toHall(g);src.start(s);
    const o=ctx.createOscillator(),og=ctx.createGain();o.type="sine";
    o.frequency.setValueAtTime(big?58:80,s);o.frequency.exponentialRampToValueAtTime(30,s+.28);
    og.gain.setValueAtTime(big?.5:.22,s);og.gain.exponentialRampToValueAtTime(1e-4,s+.3);
    o.connect(og);toHall(og);o.start(s);o.stop(s+.35);}
  function choir(f,s,d,v,att){                               // formant-filtered "male choir"
    const g=ctx.createGain();g.gain.setValueAtTime(0,s);
    g.gain.linearRampToValueAtTime(v,s+(att||.25));g.gain.setValueAtTime(v,s+d*.6);g.gain.linearRampToValueAtTime(0,s+d);
    const f1=ctx.createBiquadFilter();f1.type="bandpass";f1.frequency.value=520;f1.Q.value=1.6;
    const f2=ctx.createBiquadFilter();f2.type="bandpass";f2.frequency.value=910;f2.Q.value=2.2;
    const mix=ctx.createGain();f1.connect(mix);f2.connect(mix);mix.connect(g);toHall(g);
    for(const det of[-5,0,4]){const o=ctx.createOscillator();o.type="sawtooth";
      o.frequency.value=f*(1+det/1000);o.connect(f1);o.connect(f2);o.start(s);o.stop(s+d+.05);}}
  /* Dragonborn-style sequencer: D minor, galloping taikos, three-syllable chant */
  const STEP=.21,D2=73.42;
  const PROG=[1,1,4/5,8/9];                                  // D — D — Bb — C  (as ratios of D2)
  const CHANT=[[3/2,4/3,6/5],[1,6/5,4/3],[3/2,4/3,6/5],[2,9/5,3/2]]; // original nordic line, not the game's melody
  let step=0;
  function tick(){const s=ctx.currentTime+.08;
    const bar=Math.floor(step/16)%4,st=step%16,root=D2*PROG[bar];
    if([0,3,4,8,11,12].includes(st))taiko(s,st===0||st===8);          // gallop
    if(st===0){choir(root,s,3.4,.085);choir(root*1.5,s,3.4,.05);choir(root*2,s,3.4,.04);}  // chord bed
    if(st===0||st===5||st===10){const n=CHANT[bar][st===0?0:st===5?1:2];
      choir(root*2*n,s,1.05,.11,.06);}                               // FUS-RO-DAH style chant
    if(st===8&&bar%2===1)tone(root*4,s,1.6,.03,"triangle");          // faint horn answer
    step++;}
  function start(){if(on)return;ac();ensureHall();on=true;step=0;tick();timers.push(setInterval(tick,STEP*1000));}
  function stop(){on=false;timers.forEach(clearInterval);timers=[];}
  function roar(){ac();const s=ctx.currentTime+.02;
    const o=ctx.createOscillator(),g=ctx.createGain();o.type="sawtooth";
    o.frequency.setValueAtTime(95,s);o.frequency.exponentialRampToValueAtTime(34,s+1.3);
    g.gain.setValueAtTime(.4,s);g.gain.exponentialRampToValueAtTime(1e-4,s+1.5);
    o.connect(g).connect(master);o.start(s);o.stop(s+1.6);
    const b=ctx.createBuffer(1,ctx.sampleRate*1.2,ctx.sampleRate),ch=b.getChannelData(0);
    for(let i=0;i<ch.length;i++)ch[i]=(Math.random()*2-1)*Math.pow(1-i/ch.length,2)*.7;
    const src=ctx.createBufferSource();src.buffer=b;const f=ctx.createBiquadFilter();f.type="lowpass";f.frequency.value=220;
    const g2=ctx.createGain();g2.gain.setValueAtTime(.35,s);g2.gain.exponentialRampToValueAtTime(1e-4,s+1.2);
    src.connect(f).connect(g2).connect(master);src.start(s);}
  function shoutSfx(){ac();const s=ctx.currentTime+.02;
    const b=ctx.createBuffer(1,ctx.sampleRate*.8,ctx.sampleRate),ch=b.getChannelData(0);
    for(let i=0;i<ch.length;i++)ch[i]=(Math.random()*2-1)*Math.pow(1-i/ch.length,1.5);
    const src=ctx.createBufferSource();src.buffer=b;const f=ctx.createBiquadFilter();f.type="bandpass";f.frequency.value=500;f.Q.value=.7;
    const g=ctx.createGain();g.gain.setValueAtTime(.55,s);g.gain.exponentialRampToValueAtTime(1e-4,s+.8);
    src.connect(f).connect(g).connect(master);src.start(s);
    tone(65,s,.9,.4,"square");}
  function swing(){ac();const s=ctx.currentTime+.02;
    const b=ctx.createBuffer(1,ctx.sampleRate*.18,ctx.sampleRate),ch=b.getChannelData(0);
    for(let i=0;i<ch.length;i++)ch[i]=(Math.random()*2-1)*Math.pow(1-i/ch.length,1.2)*.5;
    const src=ctx.createBufferSource();src.buffer=b;const f=ctx.createBiquadFilter();f.type="highpass";f.frequency.value=1800;
    const g=ctx.createGain();g.gain.setValueAtTime(.22,s);g.gain.exponentialRampToValueAtTime(1e-4,s+.18);
    src.connect(f).connect(g).connect(master);src.start(s);}
  function hum(v){ac();ensureHall();const s=ctx.currentTime+.02;   // word-wall chant
    choir(D2*2,s,2.4,.1*v,.6);choir(D2*3,s,2.4,.055*v,.6);}
  return{toggle:()=>{on?stop():start();return on;},roar,shoutSfx,swing,hum,ensure:ac};
})();
musicBtn.onclick=()=>{musicBtn.textContent=Music.toggle()?"♪ Music: on":"♪ Music: off";};

/* ============================================================ TERRAIN */
const WS=560;                       // world size (units)
const G=200;                        // grid resolution
function hash2(x,z){let h=Math.imul(x|0,374761393)+Math.imul(z|0,668265263);
  h=Math.imul(h^(h>>>13),1274126177);h^=h>>>16;return (h>>>0)/4294967295;}
function vnoise(x,z){const xi=Math.floor(x),zi=Math.floor(z),xf=x-xi,zf=z-zi,
  u=xf*xf*(3-2*xf),v=zf*zf*(3-2*zf),
  a=hash2(xi,zi),b=hash2(xi+1,zi),c=hash2(xi,zi+1),d=hash2(xi+1,zi+1);
  return a+(b-a)*u+(c-a)*v+(a-b-c+d)*u*v;}
function fbm(x,z){let s=0,amp=1,f=1,tot=0;
  for(let o=0;o<5;o++){s+=vnoise(x*f+37.7,z*f+91.3)*amp;tot+=amp;amp*=.5;f*=2.03;}return s/tot;}
function height(x,z){
  const n=fbm(x/170,z/170),r=Math.hypot(x,z);
  let h=Math.pow(n,2.6)*150-9;                           // nordic peaks, dales dip below the lake
  h+=fbm(x/34+7,z/34+3)*7-3;                             // rolling detail
  const rim=Math.min(1,Math.max(0,(r-WS*0.36)/(WS*0.14)));h+=rim*rim*95; // mountain ring at world edge
  const t=Math.min(1,Math.max(0,(48-r)/22));h=h*(1-t)+2.2*t;             // fully flat village dale
  return h;}
const getH=height;

/* ============================================================ THREE */
const isTouch=matchMedia("(hover:none)").matches||"ontouchstart" in window;
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:!isTouch});
renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,isTouch?1.15:1.5));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.22;
const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x39485a,30,300);
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,1400);camera.rotation.order="YXZ";

scene.add(new THREE.HemisphereLight(0x5d7492,0x272c26,0.5));
const sun=new THREE.DirectionalLight(0xbcd4f0,1.1);scene.add(sun);scene.add(sun.target);  // moonlight
sun.castShadow=true;sun.shadow.mapSize.set(isTouch?1024:2048,isTouch?1024:2048);sun.shadow.bias=-0.002;sun.shadow.normalBias=0.06;
const sc2=sun.shadow.camera;sc2.left=-110;sc2.right=110;sc2.top=110;sc2.bottom=-110;sc2.near=20;sc2.far=500;

/* gradient dusk sky */
const skyDome=new THREE.Mesh(new THREE.SphereGeometry(1100,24,12),new THREE.ShaderMaterial({
  side:THREE.BackSide,depthWrite:false,fog:false,
  uniforms:{top:{value:new THREE.Color(0x0d1522)},mid:{value:new THREE.Color(0x2c3b4d)},bot:{value:new THREE.Color(0x7d8fa3)}},
  vertexShader:"varying vec3 vP;void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}",
  fragmentShader:"uniform vec3 top;uniform vec3 mid;uniform vec3 bot;varying vec3 vP;void main(){float h=clamp(normalize(vP).y,0.0,1.0);vec3 c=h<0.18?mix(bot,mid,h/0.18):mix(mid,top,(h-0.18)/0.82);gl_FragColor=vec4(c,1.0);}"
}));
skyDome.renderOrder=-2;scene.add(skyDome);

/* stars + the two moons */
{
  const n=700,pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){const az=Math.random()*Math.PI*2,el=Math.random()*1.35+.1,r=1000;
    pos[i*3]=Math.cos(el)*Math.sin(az)*r;pos[i*3+1]=Math.sin(el)*r;pos[i*3+2]=Math.cos(el)*Math.cos(az)*r;}
  const g=new THREE.BufferGeometry();g.setAttribute("position",new THREE.BufferAttribute(pos,3));
  const st=new THREE.Points(g,new THREE.PointsMaterial({size:1.7,sizeAttenuation:false,color:0xdfe8ff,
    transparent:true,opacity:.85,depthWrite:false,depthTest:false,fog:false}));
  st.renderOrder=-1;skyDome.add(st);
}
function moon(size,az,el,base,spot){
  const c=document.createElement("canvas");c.width=c.height=128;const g=c.getContext("2d");
  g.fillStyle=base;g.beginPath();g.arc(64,64,60,0,7);g.fill();
  g.fillStyle=spot;for(let i=0;i<8;i++){g.beginPath();
    g.arc(24+hash2(i,3)*80,24+hash2(i,7)*80,4+hash2(i,11)*11,0,7);g.fill();}
  g.globalCompositeOperation="destination-in";g.beginPath();g.arc(64,64,60,0,7);g.fill();
  const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,depthTest:false,fog:false}));
  s.scale.set(size,size,1);const r=900;
  s.position.set(Math.cos(el)*Math.sin(az)*r,Math.sin(el)*r,Math.cos(el)*Math.cos(az)*r);
  s.renderOrder=-1;skyDome.add(s);}
moon(105,-.65,.52,"#b8a294","#8a7268");    // Masser
moon(40,-.25,.72,"#e2e7ec","#aeb7c0");     // Secunda

/* auroras */
const auroraU={t:{value:0}};
function aurora(y,z,hue,phase){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(900,80,96,1),new THREE.ShaderMaterial({
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide,fog:false,
    uniforms:{t:auroraU.t,hue:{value:hue},ph:{value:phase}},
    vertexShader:"uniform float t;uniform float ph;varying vec2 vU;void main(){vU=uv;vec3 p=position;p.y+=sin(uv.x*8.0+t*0.6+ph)*16.0;p.z+=sin(uv.x*5.0-t*0.35+ph)*20.0;gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.0);}",
    fragmentShader:"uniform float t;uniform vec3 hue;uniform float ph;varying vec2 vU;void main(){float band=sin(vU.x*20.0+t+ph)*0.5+0.5;float edge=smoothstep(0.0,0.25,vU.y)*smoothstep(1.0,0.45,vU.y);gl_FragColor=vec4(hue,edge*(0.07+0.16*band));}"
  }));
  m.position.set(0,y,z);m.rotation.x=0.45;scene.add(m);return m;}
aurora(300,-540,new THREE.Color(0x37e6a0),0);
aurora(340,-660,new THREE.Color(0x59c9ff),2.3);

/* glow sprite texture */
const glowTex=(()=>{const c=document.createElement("canvas");c.width=c.height=64;const g=c.getContext("2d");
  const r=g.createRadialGradient(32,32,0,32,32,32);r.addColorStop(0,"rgba(255,255,255,.95)");
  r.addColorStop(0.35,"rgba(255,255,255,.3)");r.addColorStop(1,"rgba(255,255,255,0)");
  g.fillStyle=r;g.fillRect(0,0,64,64);
  const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;return t;})();
function addGlow(x,y,z,size,color){
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,color,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));
  s.scale.set(size,size,1);s.position.set(x,y,z);scene.add(s);return s;}

/* ----- terrain mesh with height/slope vertex colors ----- */
const tGeo=new THREE.PlaneGeometry(WS,WS,G,G);tGeo.rotateX(-Math.PI/2);
{
  const P=tGeo.attributes.position;
  for(let i=0;i<P.count;i++)P.setY(i,height(P.getX(i),P.getZ(i)));
  tGeo.computeVertexNormals();
  const col=new Float32Array(P.count*3),N=tGeo.attributes.normal;
  const cGrass=new THREE.Color(0x505c41),cRock=new THREE.Color(0x5d6066),
        cSnow=new THREE.Color(0xdfe6ec),cMud=new THREE.Color(0x4c483c),tmp=new THREE.Color();
  for(let i=0;i<P.count;i++){
    const h=P.getY(i),ny=N.getY(i);
    tmp.copy(h<1.2?cMud:cGrass);
    if(h>12)tmp.lerp(cRock,Math.min(1,(h-12)/14));
    if(h>30)tmp.lerp(cSnow,Math.min(1,(h-30)/14));
    if(ny<0.72)tmp.lerp(cRock,Math.min(1,(0.72-ny)/0.3));   // steep = rock
    // subtle variation
    const v=0.92+hash2(i,i*7)*0.16;tmp.multiplyScalar(v);
    col[i*3]=tmp.r;col[i*3+1]=tmp.g;col[i*3+2]=tmp.b;
  }
  tGeo.setAttribute("color",new THREE.BufferAttribute(col,3));
}

    u.t-=dt;

      if(d<7&&r<.5){u.st="curious";u.t=3+r*4;}

    c.tail.rotation.x=.5+Math.sin(time*2.3+u.ph)*.3;                 // tail sway

  }
}

  flash.style.opacity=1;setTimeout(()=>flash.style.opacity=0,220);
  if(player.hp<=0){player.dead=true;document.getElementById("died").classList.remove("hide");
    document.exitPointerLock&&document.exitPointerLock();}}
function killWolf(w){const u=w.userData;if(u.dead)return;u.dead=1e-4;kills++;
  setTimeout(()=>{scene.remove(w);const i=wolves.indexOf(w);if(i>=0)wolves.splice(i,1);spawnWolf((Math.random()*999)|0,true);},9000);}

/* ============================================================ INPUT */
const keys={};
addEventListener("keydown",e=>{const k=e.key.toLowerCase();keys[k]=true;
  if(k==="q")doShout();
  if([" ","arrowup","arrowdown"].includes(k))e.preventDefault();});
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);
cv.addEventListener("mousedown",e=>{if(document.pointerLockElement===cv&&e.button===0)doSwing();});
addEventListener("mousemove",e=>{if(document.pointerLockElement!==cv)return;
  yaw-=e.movementX*.0024;pitch-=e.movementY*.0024;
  const l=Math.PI/2-.01;pitch=Math.max(-l,Math.min(l,pitch));});

/* ----- touch: drag to look, joystick to move, buttons to act ----- */
let moveF=0,moveS=0;
if(isTouch){
  document.getElementById("touch").style.display="block";
  let lookId=null,lookX=0,lookY=0;
  cv.addEventListener("touchstart",e=>{e.preventDefault();
    for(const t of e.changedTouches)if(lookId===null){lookId=t.identifier;lookX=t.clientX;lookY=t.clientY;}},{passive:false});
  addEventListener("touchmove",e=>{
    for(const t of e.changedTouches)if(t.identifier===lookId){
      yaw-=(t.clientX-lookX)*.005;pitch-=(t.clientY-lookY)*.005;
      const l=Math.PI/2-.01;pitch=Math.max(-l,Math.min(l,pitch));
      lookX=t.clientX;lookY=t.clientY;}},{passive:false});
  addEventListener("touchend",e=>{for(const t of e.changedTouches)if(t.identifier===lookId)lookId=null;});
  const joy=document.getElementById("joy"),knob=document.getElementById("knob"),R=44;
  let joyId=null,jcx=0,jcy=0;
  const joyMove=t=>{let dx=t.clientX-jcx,dy=t.clientY-jcy;const d=Math.hypot(dx,dy);
    if(d>R){dx*=R/d;dy*=R/d;}
    knob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
    moveS=dx/R;moveF=-dy/R;};
  joy.addEventListener("touchstart",e=>{e.preventDefault();e.stopPropagation();
    const t=e.changedTouches[0];joyId=t.identifier;
    const r=joy.getBoundingClientRect();jcx=r.left+r.width/2;jcy=r.top+r.height/2;joyMove(t);},{passive:false});
  addEventListener("touchmove",e=>{for(const t of e.changedTouches)if(t.identifier===joyId)joyMove(t);},{passive:false});
  addEventListener("touchend",e=>{for(const t of e.changedTouches)if(t.identifier===joyId){
    joyId=null;moveF=moveS=0;knob.style.transform="translate(-50%,-50%)";}});
  const bind=(id,fn)=>document.getElementById(id).addEventListener("touchstart",
    e=>{e.preventDefault();e.stopPropagation();fn();},{passive:false});
  bind("bAtk",doSwing);bind("bShout",doShout);
  bind("bJump",()=>{if(player.onGround&&!player.dead){player.vy=7.5;player.onGround=false;}});
  bind("bRun",()=>{keys["shift"]=!keys["shift"];
    document.getElementById("bRun").classList.toggle("on",keys["shift"]);});
}

/* ============================================================ WOLF AI */
function updateWolves(dt,time){
  for(const w of wolves){const u=w.userData;
    if(u.dead){u.dead+=dt;w.rotation.z=Math.min(Math.PI/2,u.dead*3);
      if(u.dead>2)w.position.y=height(w.position.x,w.position.z)-Math.min(1.2,(u.dead-2)*.25);continue;}
    if(u.kb){w.position.x+=u.kb.vx*dt;w.position.z+=u.kb.vz*dt;
      u.kb.vy-=18*dt;w.position.y+=u.kb.vy*dt;u.kb.t-=dt;
      const gh=height(w.position.x,w.position.z);
      if(w.position.y<=gh){w.position.y=gh;u.kb=null;}
      continue;}
    const dx=player.x-w.position.x,dz=player.z-w.position.z,d=Math.hypot(dx,dz);
    u.t-=dt;u.cool-=dt;
    if(d<26&&!player.dead)u.st="chase";else if(u.st==="chase")u.st="wander",u.t=1;
    if(u.st==="wander"&&u.t<=0){u.dir+=(hash2((w.position.x*7)|0,(w.position.z*9)|0)-.5)*2.2;u.t=2+hash2(u.ph*10|0,3)*3;}
    if(u.st==="chase"){u.dir=Math.atan2(dx,dz);
      if(d<2.1&&u.cool<=0){u.cool=1.1;damagePlayer(13);}}
    const spd=u.st==="chase"?u.spd*3.4:u.spd;
    if(d>1.4||u.st==="wander"){
      const nx=w.position.x+Math.sin(u.dir)*spd*dt,nz=w.position.z+Math.cos(u.dir)*spd*dt,nh=height(nx,nz);
      const ro=Math.hypot(w.position.x,w.position.z),rn=Math.hypot(nx,nz);
      const gate=Math.abs(Math.atan2(nx,nz))<.26;            // the south gate is the only way in
      if((ro-34.5)*(rn-34.5)<0&&!gate)u.dir+=2.8*dt;
      else if(nh>0.6&&nh<46&&Math.abs(nh-w.position.y)<2.5){w.position.x=nx;w.position.z=nz;}
      else u.dir+=2.5*dt;}
    w.position.y+=(height(w.position.x,w.position.z)-w.position.y)*Math.min(1,dt*10);
    w.rotation.y+=((u.dir-w.rotation.y+Math.PI*3)%(Math.PI*2)-Math.PI)*Math.min(1,dt*7);
    u.ph+=dt*spd*2.2;
    for(let i=0;i<4;i++)w.legs[i].rotation.x=Math.sin(u.ph+(i%2?0:Math.PI))*.55;
  }
}

/* ============================================================ DRAGON FLIGHT */
function updateDragon(dt,time){
  dSwoop-=dt;dRoarT-=dt;
  let tx,ty,tz;
  if(dSwoop>0&&dSwoop<6){                                   // swoop over the village
    const k=1-dSwoop/6;
    tx=Math.cos(dAng)*30;tz=Math.sin(dAng)*30;
    ty=18+Math.abs(k-.5)*2*60;
    if(k>.3&&k<.72)emitFire(2);                             // breathes fire at the lowest pass
    if(dRoarT<=0){dRoarT=999;Music.roar();shake=Math.max(shake,.5);showMsg("The dragon circles overhead...");}
  }else{
    if(dSwoop<=0){dSwoop=34+hash2((time*7)|0,5)*20;dRoarT=dSwoop-33.5;}
    dAng+=dt*.11;
    tx=Math.cos(dAng)*150;tz=Math.sin(dAng)*150;ty=78+Math.sin(time*.4)*10;
  }
  const p=dragon.position;
  p.x+=(tx-p.x)*Math.min(1,dt*.8);p.y+=(ty-p.y)*Math.min(1,dt*.8);p.z+=(tz-p.z)*Math.min(1,dt*.8);
  dragon.rotation.y=Math.atan2(tx-p.x,tz-p.z)+Math.PI;
  dragon.rotation.z=Math.sin(time*.9)*.12;
  const f=Math.sin(time*5.2)*.55;
  dragon.wings[0].rotation.z=f;dragon.wings[1].rotation.z=-f;
}

/* ============================================================ COMPASS */
const cmp=document.getElementById("compass"),cg=cmp.getContext("2d");
function drawCompass(){
  const W=cmp.width,H=cmp.height,cy2=H/2;cg.clearRect(0,0,W,H);
  cg.fillStyle="rgba(8,10,12,.38)";cg.fillRect(0,cy2-11,W,22);
  cg.fillStyle="rgba(225,230,235,.75)";cg.fillRect(0,cy2-11,W,1);cg.fillRect(0,cy2+10,W,1);
  const ppr=W/(Math.PI*1.15),wrap=a=>Math.atan2(Math.sin(a),Math.cos(a));
  cg.textAlign="center";cg.textBaseline="middle";
  for(let deg=0;deg<360;deg+=15){                        // graduation ticks
    const x=W/2-wrap(deg*Math.PI/180-yaw)*ppr;if(x<6||x>W-6)continue;
    cg.fillStyle="rgba(225,230,235,.5)";cg.fillRect(x-.5,cy2+4,1,5);}
  const items=[["N",0],["E",-Math.PI/2],["S",Math.PI],["W",Math.PI/2]];
  for(const[t,a]of items){
    const x=W/2-wrap(a-yaw)*ppr;if(x<10||x>W-10)continue;
    cg.fillStyle="#e6eaee";cg.font="600 15px 'Segoe UI',Arial";cg.fillText(t,x,cy2-1);}
  for(const w of WORDS){if(w.taken)continue;             // quest markers
    const a=Math.atan2(w.x-player.x,w.z-player.z)+Math.PI;
    const x=W/2-wrap(a-yaw)*ppr;if(x<8||x>W-8)continue;
    cg.fillStyle="#cfe6f8";cg.beginPath();cg.moveTo(x,cy2-7);cg.lineTo(x+5,cy2+3);cg.lineTo(x-5,cy2+3);cg.closePath();cg.fill();}
  cg.fillStyle="#e6eaee";cg.beginPath();cg.moveTo(W/2,cy2+12);cg.lineTo(W/2+4,cy2+18);cg.lineTo(W/2-4,cy2+18);cg.closePath();cg.fill(); // center caret
}

/* ============================================================ SNOW */
const SNOWN=isTouch?350:700,sGeo=new THREE.BufferGeometry(),sPos=new Float32Array(SNOWN*3),sSpd=new Float32Array(SNOWN);
for(let i=0;i<SNOWN;i++){sPos[i*3]=(Math.random()-.5)*80;sPos[i*3+1]=Math.random()*40;sPos[i*3+2]=(Math.random()-.5)*80;sSpd[i]=1.2+Math.random()*2;}
sGeo.setAttribute("position",new THREE.BufferAttribute(sPos,3));
const snowPts=new THREE.Points(sGeo,new THREE.PointsMaterial({color:0xffffff,size:.35,map:glowTex,transparent:true,opacity:.7,depthWrite:false}));
scene.add(snowPts);
function updateSnow(dt,time){
  for(let i=0;i<SNOWN;i++){
    let x=sPos[i*3]+Math.sin(time*.7+i*1.3)*dt,y=sPos[i*3+1]-sSpd[i]*dt,z=sPos[i*3+2];
    if(y<player.y-6)y+=44;
    if(x<player.x-40)x+=80;else if(x>player.x+40)x-=80;
    if(z<player.z-40)z+=80;else if(z>player.z+40)z-=80;
    sPos[i*3]=x;sPos[i*3+1]=y;sPos[i*3+2]=z;}
  sGeo.attributes.position.needsUpdate=true;}

/* ============================================================ PHYSICS */
let shake=0;
function physics(dt){
  if(player.dead)return;
  const sprint=keys["shift"]&&player.st>1;
  const spd=sprint?9.5:5.2;
  if(sprint&&(keys["w"]||keys["a"]||keys["s"]||keys["d"]))player.st=Math.max(0,player.st-16*dt);
  else player.st=Math.min(100,player.st+9*dt);
  let mx=0,mz=0;
  if(keys["w"])mz-=1;if(keys["s"])mz+=1;if(keys["a"])mx-=1;if(keys["d"])mx+=1;
  if(isTouch){mx+=moveS;mz-=moveF;}
  const l=Math.hypot(mx,mz);
  if(l>1e-4){const il=Math.min(1,l)/l;mx*=il;mz*=il;
    player.x+=(Math.sin(yaw)*mz+Math.cos(yaw)*mx)*spd*dt;
    player.z+=(Math.cos(yaw)*mz-Math.sin(yaw)*mx)*spd*dt;}
  const gh=height(player.x,player.z);
  if(keys[" "]&&player.onGround){player.vy=7.5;player.onGround=false;}
  player.vy-=20*dt;player.y+=player.vy*dt;
  if(player.y<=gh){player.y=gh;player.vy=0;player.onGround=true;}
  player.hp=Math.min(100,player.hp+1.1*dt);
  /* word pickup */
  for(const w of WORDS){if(w.taken)continue;
    if(Math.hypot(w.x-player.x,w.z-player.z)<4){
      w.taken=true;wordsLearned++;w.glow.material.color.set(0x2a4a66);w.light.intensity=6;
      Music.shoutSfx();shake=Math.max(shake,.3);
      showMsg(`Word of Power learned — ${w.label}`);}}
}

/* ============================================================ LOOP */
const overlay=document.getElementById("overlay");
let started=false,last=performance.now(),humT=1;
function loop(now){
  const dt=Math.min(.05,(now-last)/1000),time=now/1000;last=now;
  if(document.pointerLockElement===cv||(isTouch&&started))physics(dt);
  updateWolves(dt,time);updateCats(dt,time);updateDragon(dt,time);updateSnow(dt,time);
  updateFire(dt);updateBugs(time);
  auroraU.t.value=time;
  /* word walls hum as you approach */
  humT-=dt;
  if(humT<=0){let best=99;
    for(const w of WORDS)if(!w.taken)best=Math.min(best,Math.hypot(w.x-player.x,w.z-player.z));
    if(best<20){Music.hum(1-best/20);humT=2.1;}else humT=.5;}
  /* sword swing animation + hit */
  if(swing>0){swing-=dt;const k=1-swing/.34;
    sword.rotation.x=.25-Math.sin(k*Math.PI)*1.5;
    sword.rotation.z=-.22-Math.sin(k*Math.PI)*.7;
    if(k>.35&&!swingHit){swingHit=true;
      const fx=-Math.sin(yaw),fz=-Math.cos(yaw);
      for(const w of wolves){const u=w.userData;if(u.dead)continue;
        const dx=w.position.x-player.x,dz=w.position.z-player.z,d=Math.hypot(dx,dz);
        if(d<3.6&&(dx*fx+dz*fz)/(d||1)>.55){u.hp--;u.kb={vx:dx/d*4,vz:dz/d*4,vy:2.5,t:.4};
          if(u.hp<=0)killWolf(w);}}}
  }else{sword.rotation.x=.25+Math.sin(time*1.7)*.02;sword.rotation.z=-.22;
    sword.position.y=-.42+Math.sin(time*2.1)*.008;}
  shoutCd=Math.max(0,shoutCd-dt);
  /* camera */
  camera.position.set(player.x,player.y+EYE,player.z);
  camera.rotation.y=yaw;camera.rotation.x=pitch;
  if(shake>0){shake-=dt*1.4;
    camera.position.x+=(Math.random()-.5)*shake*.5;
    camera.position.y+=(Math.random()-.5)*shake*.5;}
  sun.position.set(player.x+120,150,player.z+60);sun.target.position.set(player.x,0,player.z);
  skyDome.position.set(player.x,0,player.z);
  drawCompass();updateHud();
  renderer.render(scene,camera);requestAnimationFrame(loop);}
requestAnimationFrame(loop);

/* start / death / resize */
playBtn.onclick=()=>{overlay.classList.add("hide");started=true;Music.ensure();
  if(isTouch){const de=document.documentElement;
    de.requestFullscreen&&de.requestFullscreen().catch(()=>{});
    screen.orientation&&screen.orientation.lock&&screen.orientation.lock("landscape").catch(()=>{});}
  else cv.requestPointerLock();};
document.getElementById("died").addEventListener("click",()=>{
  player.hp=100;player.st=100;player.dead=false;player.x=0;player.z=34;player.vy=0;
  document.getElementById("died").classList.add("hide");if(!isTouch)cv.requestPointerLock();});
document.addEventListener("pointerlockchange",()=>{
  if(!isTouch&&started&&!player.dead&&document.pointerLockElement!==cv)overlay.classList.remove("hide");});
addEventListener("resize",()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
addEventListener("contextmenu",e=>e.preventDefault());
</script>
